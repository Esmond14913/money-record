<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>出差記帳助手 - 純淨精品版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Content Area -->
        <div id="content-area">
            
            <!-- Page: Home (明細) -->
            <main id="page-home" class="page active">
                <header class="dashboard">
                    <div class="dash-inner">
                        <span class="total-label">出差總支出 (TWD)</span>
                        <div class="total-amount">
                            <span class="currency-symbol">$</span>
                            <span id="total-home">0</span>
                        </div>
                        <div class="exchange-info">
                            <div class="info-block">
                                <span class="small-label" id="foreign-label">外幣總計</span>
                                <span id="total-foreign" class="info-value">0</span>
                            </div>
                            <div class="info-divider"></div>
                            <div class="info-block">
                                <span class="small-label">參考匯率</span>
                                <span id="current-rate-display" class="info-value">1:820</span>
                            </div>
                        </div>
                    </div>
                </header>
                
                <div class="section-header">
                    <h2>消費明細</h2>
                    <span class="item-count" id="item-count">0 筆</span>
                </div>
                <div id="record-list" class="record-list"></div>
            </main>

            <!-- Page: Stats (分析) -->
            <main id="page-stats" class="page">
                <div class="section-header" style="margin-top:1rem;">
                    <div style="display:flex; align-items:center; gap:0.5rem;">
                        <h2>統計分析</h2>
                    </div>
                    <span class="stat-summary" id="stat-total-info">總計 $0</span>
                </div>
                
                <div class="glass-card pie-section">
                    <h3 class="card-subtitle">類別佔比分析</h3>
                    <div id="category-pie" class="pie-chart"></div>
                    <div id="category-legend" class="pie-legend"></div>
                </div>

                <div class="section-header" style="margin-top:2rem;">
                    <div style="display:flex; align-items:center; gap:0.5rem; color:var(--text-dim);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <h2 style="font-size:1rem;">每日總花費趨勢 (TWD)</h2>
                    </div>
                </div>
                
                <div class="chart-scroll-box">
                    <div id="daily-bars" class="vertical-bar-container">
                        <!-- Vertical bars injected here -->
                    </div>
                </div>
            </main>

            <!-- Page: Settings (管理) -->
            <main id="page-settings" class="page">
                <div class="section-header" style="margin-top:1rem;">
                    <h2>系統管理</h2>
                </div>

                <div class="glass-card settings-group">
                    <h3 class="settings-title">幣別與匯率</h3>
                    <div id="currency-list" class="manager-list"></div>
                    <div class="quick-add-wrap">
                        <div class="input-row">
                            <div class="input-field">
                                <input type="text" id="new-currency-code" placeholder="代碼 (如 USD)" class="glass-input" oninput="handleCurrencyLookup()">
                                <small id="currency-name-hint" class="input-hint">名稱將自動代入...</small>
                            </div>
                            <div class="input-field">
                                <input type="number" id="new-currency-rate" placeholder="1 TWD : ?" class="glass-input">
                                <small class="input-hint">輸入匯率值</small>
                            </div>
                        </div>
                        <button onclick="addCurrency()" class="add-btn-wide">新增幣別</button>
                    </div>
                </div>

                <div class="glass-card settings-group">
                    <h3 class="settings-title">類別自定義</h3>
                    <div id="category-list" class="tag-cloud"></div>
                    <div class="quick-add-wrap">
                        <div class="input-row" style="grid-template-columns: 2.2fr 1fr;">
                            <input type="text" id="new-category-name" placeholder="分類名稱" class="glass-input">
                            <button onclick="addCategory()" class="add-btn-wide" style="padding:0; min-height: 2.8rem;">新增</button>
                        </div>
                    </div>
                </div>

                <div class="glass-card settings-group">
                    <h3 class="settings-title">資料管理與備份</h3>
                    <input type="email" id="export-email" placeholder="備份信箱" class="glass-input" style="width:100%; margin-bottom:1rem;">
                    <div class="btn-grid">
                        <button onclick="exportData()" class="action-btn-glass">📤 匯出備份</button>
                        <label class="action-btn-glass">
                            📥 匯入資料
                            <input type="file" id="import-file" accept=".xlsx" style="display:none;" onchange="importData(event)">
                        </label>
                    </div>
                </div>

                <div class="glass-card settings-group">
                    <h3 class="settings-title">幫助與支援</h3>
                    <button onclick="openManual()" class="action-btn-glass" style="width:100%; border-color:var(--secondary); color:var(--secondary); font-weight:800;">📖 快速使用指南 (User Manual)</button>
                </div>

                <div style="padding: 0 1rem;">
                    <button onclick="confirmClearAll()" class="danger-btn-glass">🗑️ 清除所有記帳紀錄</button>
                </div>

            </main>
        </div>

        <footer class="app-footer">
            <p>Designed by Esmond</p>
            <span class="v-tag">v4.3 Premium</span>
        </footer>

        <!-- Sticky Footer Nav -->
        <nav class="footer-nav">
            <button class="nav-item active" data-page="home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>明細</span>
            </button>
            <button class="nav-item" data-page="stats">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                <span>分析</span>
            </button>
            
            <div class="action-trigger" id="add-btn-main">
                <div class="glow-bg"></div>
                <div class="main-add-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
            </div>

            <button class="nav-item" data-page="settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>管理</span>
            </button>
        </nav>

        <!-- Global Modals Area -->
        <div id="modal-overlay" class="modal-overlay">
            <div id="modal-content" class="modal-content glass-card"></div>
        </div>
    </div>

    <!-- Expense Form Template -->
    <template id="form-template">
        <div class="modal-header">
            <h3 id="modal-title">記帳</h3>
            <button onclick="closeModal()" class="close-icon-btn">✕</button>
        </div>
        <form id="expense-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>幣別</label>
                    <select id="currency-select" class="glass-select"></select>
                </div>
                <div class="form-group">
                    <label>消費金額</label>
                    <input type="number" id="foreign-amount" class="glass-input" placeholder="0" required inputmode="numeric">
                </div>
            </div>
            <div class="form-group">
                <label>選擇分類</label>
                <div id="form-category-grid" class="category-selector-grid"></div>
            </div>
            <div class="form-group">
                <label>備註紀錄</label>
                <input type="text" id="tag" class="glass-input" placeholder="例如：飯店午餐...">
            </div>
            <div class="form-group">
                <label>消費日期</label>
                <input type="date" id="date" class="glass-input">
            </div>
            </div>
        </form>
    </template>

    <!-- Project Manual Template -->
    <template id="manual-template">
        <div class="modal-header">
            <h3>📖 使用指南</h3>
            <button onclick="closeModal()" class="close-icon-btn">✕</button>
        </div>
        <div class="manual-content">
            <section class="m-section">
                <h4>🚀 安裝到手機 (PWA)</h4>
                <div class="m-item"><strong>安卓 (Chrome)：</strong> 點擊「⋮」>「安裝應用程式」</div>
                <div class="m-item"><strong>iPhone (Safari)：</strong> 點擊分享鈕「↑」>「加入主畫面」</div>
            </section>
            <section class="m-section">
                <h4>🛠️ 設定匯率與類別</h4>
                <div class="m-item">在「管理」分頁，可新增自定義記帳類別與設定參考匯率。</div>
            </section>
            <section class="m-section">
                <h4>💰 如何記帳</h4>
                <div class="m-item">點擊「+」大按鈕，選擇幣別、輸入金額、選擇分類並儲存即可。</div>
                <div class="m-item">點擊首頁列表可進入「編輯模式」修改或刪除。</div>
            </section>
            <section class="m-section">
                <h4>💾 備份與還原 (極重要)</h4>
                <div class="m-item">設定備份信箱後點擊「匯出備份」存成 Excel。</div>
                <div class="m-item">換手機時，點擊「匯入資料」選取該 Excel 即可一鍵還原。</div>
            </section>
            <section class="m-section">
                <h4>🛡️ 隱私聲明</h4>
                <div class="m-item">資料完全存放在手機本地，不會上傳雲端，請定期備份 Excel。</div>
            </section>
            <div style="text-align:center; padding-top:1rem; opacity:0.5; font-size:0.7rem;">
                Powered by Esmond v4.3
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
